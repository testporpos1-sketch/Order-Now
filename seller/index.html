<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#080f18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ঘরের স্বাদ — Seller">
<link rel="manifest" href="/manifest.json">
<title>ঘরের স্বাদ — Seller Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080f18;--card:#0e1c2b;--card2:#132233;--border:#1a3347;
  --gold:#f0b429;--blue:#3b9eff;--green:#34d399;--red:#f87171;
  --purple:#a78bfa;--text:#e2eaf4;--muted:#4a6a88;--orange:#fb923c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Hind Siliguri',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:80px;}
input,select,button,textarea{font-family:inherit;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)!important;}
button:active{opacity:.8;transform:scale(.97);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ring{0%,100%{transform:rotate(0)}10%,30%,50%,70%,90%{transform:rotate(-10deg)}20%,40%,60%,80%{transform:rotate(10deg)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}70%{box-shadow:0 0 0 16px rgba(248,113,113,0)}}
.anim{animation:fadeUp .25s ease;}

/* Alarm overlay */
#alarm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#alarm-overlay.show{display:flex;}
.alarm-bell{font-size:72px;animation:ring .5s linear infinite;}
.alarm-title{font-size:24px;font-weight:800;color:var(--red);}
.alarm-sub{font-size:14px;color:var(--muted);text-align:center;}
.alarm-stop-btn{background:var(--red);color:#fff;border:none;border-radius:18px;padding:16px 40px;font-size:18px;font-weight:800;cursor:pointer;font-family:inherit;animation:pulse 1.5s infinite;}

/* Header */
#header{background:linear-gradient(135deg,#060e1a,#0c1e35);padding:15px 18px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;}
.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--gold),#c06000);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.hdr-text .title{font-weight:800;font-size:16px;}
.hdr-text .sub{font-size:11px;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:5px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .4s;flex-shrink:0;}
.sync-dot.ok{background:var(--green);}.sync-dot.syncing{background:var(--gold);animation:spin 1s linear infinite;}.sync-dot.err{background:var(--red);}
.new-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:800;display:none;}
.new-badge.show{display:block;}

/* Nav */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#060d18;border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;border:none;background:none;padding:10px 0 8px;cursor:pointer;color:var(--muted);transition:color .2s;position:relative;}
.nav-btn.active{color:var(--gold);}
.nav-bar{position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:2px;background:var(--gold);border-radius:0 0 3px 3px;display:none;}
.nav-btn.active .nav-bar{display:block;}
.nav-icon{font-size:20px;}.nav-label{font-size:10px;margin-top:2px;}.nav-btn.active .nav-label{font-weight:700;}

#content{padding:14px 14px 0;}.tab{display:none;}.tab.active{display:block;}
.gcard{background:var(--card);border-radius:16px;padding:14px;border:1px solid var(--border);margin-bottom:10px;}
.gcard-title{font-weight:700;font-size:13px;color:var(--blue);margin-bottom:10px;}
.inp{width:100%;background:#0a1525;border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;transition:border-color .2s;}
.inp::placeholder{color:var(--muted);}
.label{font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;}.field{margin-bottom:10px;}
.btn{border:1px solid;border-radius:12px;padding:12px 16px;font-size:14px;font-weight:700;cursor:pointer;width:100%;text-align:center;transition:opacity .2s;}
.btn-blue{background:linear-gradient(135deg,#1a6fd4,var(--blue));color:#fff;border-color:var(--blue);}
.btn-gold{background:rgba(240,180,41,.12);color:var(--gold);border-color:rgba(240,180,41,.35);}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--border);}
.btn-green{background:linear-gradient(135deg,#059669,var(--green));color:#fff;border-color:var(--green);}
.btn-red{background:rgba(248,113,113,.1);color:var(--red);border-color:rgba(248,113,113,.3);}
.btn-row{display:flex;gap:8px;}.btn-row .btn{flex:1;}.btn:disabled{opacity:.45;cursor:not-allowed;}

.pills{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.pill{border-radius:12px;padding:10px 8px;text-align:center;}.pill-val{font-size:18px;font-weight:800;}.pill-label{font-size:10px;color:var(--muted);margin-top:2px;}

/* Order card */
.order-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:14px;margin-bottom:10px;transition:border-color .2s;}
.order-card.new-order{border-color:var(--red);background:rgba(248,113,113,.04);}
.order-card.confirmed{border-color:rgba(59,158,255,.4);}
.order-card.preparing{border-color:rgba(240,180,41,.4);}
.order-card.delivered{border-color:rgba(52,211,153,.3);opacity:.8;}
.order-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.order-id{font-weight:800;font-size:15px;}
.order-time{font-size:11px;color:var(--muted);}
.order-status-badge{font-size:11px;font-weight:700;border-radius:20px;padding:3px 10px;}
.sb-pending{background:rgba(248,113,113,.15);color:var(--red);}
.sb-confirmed{background:rgba(59,158,255,.15);color:var(--blue);}
.sb-preparing{background:rgba(240,180,41,.15);color:var(--gold);}
.sb-delivered{background:rgba(52,211,153,.15);color:var(--green);}
.sb-cancelled{background:rgba(255,255,255,.06);color:var(--muted);}
.order-customer{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:10px;background:var(--card2);border-radius:10px;}
.customer-avatar{width:34px;height:34px;border-radius:9px;background:rgba(59,158,255,.1);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--blue);flex-shrink:0;}
.customer-info{flex:1;}
.customer-name{font-weight:700;font-size:14px;}
.customer-phone{font-size:12px;color:var(--muted);}
.order-items-list{margin-bottom:10px;}
.order-item-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);}
.order-item-row:last-child{border:none;}
.order-addr{background:rgba(240,180,41,.05);border:1px solid rgba(240,180,41,.15);border-radius:10px;padding:10px;margin-bottom:10px;font-size:12px;}
.order-addr-label{color:var(--gold);font-weight:700;margin-bottom:4px;}
.order-addr-text{color:var(--muted);line-height:1.6;}
.order-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.order-total-label{font-size:13px;color:var(--muted);}
.order-total-val{font-size:18px;font-weight:800;color:var(--gold);}
.order-actions{display:flex;gap:6px;}

/* Map link */
.map-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--blue);text-decoration:none;background:rgba(59,158,255,.08);border-radius:7px;padding:4px 10px;margin-top:5px;}

/* Menu item management */
.menu-mgmt-item{background:var(--card);border-radius:14px;padding:12px 14px;border:1px solid var(--border);display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.mmi-emoji{width:36px;height:36px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.mmi-info{flex:1;}
.mmi-name{font-weight:700;font-size:14px;}
.mmi-price{font-size:12px;color:var(--gold);}
.mmi-toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.mmi-toggle input{opacity:0;width:0;height:0;}
.mmi-slider{position:absolute;inset:0;background:var(--border);border-radius:24px;cursor:pointer;transition:.3s;}
.mmi-toggle input:checked + .mmi-slider{background:var(--green);}
.mmi-slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
.mmi-toggle input:checked + .mmi-slider::before{transform:translateX(20px);}

/* Empty */
.empty{text-align:center;color:var(--muted);font-size:13px;padding:28px 0;background:var(--card);border-radius:14px;border:1px solid var(--border);margin-bottom:8px;}

/* Toast */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#0c1e35;color:var(--text);padding:10px 22px;border-radius:24px;font-size:13px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5);border:1px solid var(--border);white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .3s;}
#toast.show{opacity:1;}

/* Login */
#login-overlay{position:fixed;inset:0;background:var(--bg);z-index:400;display:flex;align-items:center;justify-content:center;padding:24px;}
#login-overlay.hide{display:none;}
.login-box{background:var(--card);border-radius:20px;padding:28px 24px;border:1px solid var(--border);width:100%;max-width:360px;}
.login-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--gold),#c06000);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px;}
.login-title{text-align:center;font-weight:800;font-size:18px;margin-bottom:4px;}
.login-sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:22px;}

.sec-label{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}

/* Modal */
#item-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:none;align-items:flex-end;justify-content:center;}
#item-overlay.open{display:flex;}
#item-modal{width:100%;max-width:480px;background:var(--bg);border-radius:22px 22px 0 0;padding:20px;animation:slideUp .28s cubic-bezier(.32,.72,0,1);max-height:88vh;overflow-y:auto;}
#item-modal h3{font-size:15px;font-weight:800;margin-bottom:16px;color:var(--blue);}

.month-select-wrap{display:flex;gap:8px;margin-bottom:12px;}.month-select-wrap .inp{flex:1;}
</style>
</head>
<body>

<!-- Alarm overlay -->
<div id="alarm-overlay">
  <div class="alarm-bell">🔔</div>
  <div class="alarm-title">নতুন অর্ডার!</div>
  <div class="alarm-sub" id="alarm-sub">একটি নতুন অর্ডার এসেছে</div>
  <button class="alarm-stop-btn" onclick="stopAlarm()">✓ দেখেছি — Stop</button>
</div>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-logo">🍱</div>
    <div class="login-title">ঘরের স্বাদ</div>
    <div class="login-sub">Seller Panel-এ প্রবেশ করুন</div>
    <div class="field"><div class="label">পাসওয়ার্ড</div>
      <input type="password" class="inp" id="seller-pw" placeholder="পাসওয়ার্ড লিখুন..." onkeydown="if(event.key==='Enter')doSellerLogin()">
    </div>
    <button class="btn btn-gold" onclick="doSellerLogin()">প্রবেশ করুন</button>
  </div>
</div>

<!-- Header -->
<div id="header">
  <div class="logo">🍱</div>
  <div class="hdr-text">
    <div class="title">Seller Panel</div>
    <div class="sub"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">সংযুক্ত হচ্ছে...</span></div>
  </div>
  <div class="new-badge" id="new-badge">🔴 নতুন!</div>
</div>

<div id="content">
  <!-- ORDERS TAB -->
  <div class="tab active" id="tab-orders">
    <!-- Stats -->
    <div class="pills">
      <div class="pill" style="background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);">
        <div class="pill-val" style="color:var(--red);" id="stat-pending">0</div><div class="pill-label">অপেক্ষায়</div>
      </div>
      <div class="pill" style="background:rgba(59,158,255,.1);border:1px solid rgba(59,158,255,.2);">
        <div class="pill-val" style="color:var(--blue);" id="stat-active">0</div><div class="pill-label">চলছে</div>
      </div>
      <div class="pill" style="background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.2);">
        <div class="pill-val" style="color:var(--green);" id="stat-today">0</div><div class="pill-label">আজকের বিল</div>
      </div>
    </div>

    <!-- Filter -->
    <div class="month-select-wrap">
      <select class="inp" id="order-filter" onchange="renderOrders()">
        <option value="active">🟡 চলমান অর্ডার</option>
        <option value="all">📋 সব অর্ডার</option>
        <option value="delivered">✅ ডেলিভারি হয়েছে</option>
      </select>
    </div>

    <div id="order-list"></div>
  </div>

  <!-- MENU TAB -->
  <div class="tab" id="tab-menu">
    <button class="btn btn-blue" onclick="openItemModal(null)" style="margin-bottom:12px;">➕ নতুন আইটেম যোগ করুন</button>
    <div class="sec-label">মেনু আইটেম</div>
    <div id="menu-mgmt-list"></div>
  </div>

  <!-- REPORT TAB -->
  <div class="tab" id="tab-report">
    <div class="gcard">
      <div class="gcard-title">📊 আজকের সারসংক্ষেপ</div>
      <div id="today-report"></div>
    </div>
    <div class="gcard">
      <div class="gcard-title">⚙️ Settings</div>
      <div class="field"><div class="label">শপ স্ট্যাটাস</div>
        <div style="display:flex;align-items:center;gap:12px;">
          <select class="inp" id="shop-status" onchange="updateShopStatus()">
            <option value="open">🟢 খোলা — অর্ডার নেওয়া হচ্ছে</option>
            <option value="closed">🔴 বন্ধ — অর্ডার নেওয়া হচ্ছে না</option>
          </select>
        </div>
      </div>
      <button class="btn btn-red" onclick="doLogout()" style="margin-top:8px;">🚪 লগ আউট</button>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<div id="nav">
  <button class="nav-btn active" id="nb-orders" onclick="showTab('orders')"><div class="nav-bar"></div><div class="nav-icon">📋</div><div class="nav-label">অর্ডার</div></button>
  <button class="nav-btn" id="nb-menu" onclick="showTab('menu')"><div class="nav-bar"></div><div class="nav-icon">🍽</div><div class="nav-label">মেনু</div></button>
  <button class="nav-btn" id="nb-report" onclick="showTab('report');renderReport()"><div class="nav-bar"></div><div class="nav-icon">📊</div><div class="nav-label">রিপোর্ট</div></button>
</div>

<!-- Menu item modal -->
<div id="item-overlay" onclick="closeItemModal()">
  <div id="item-modal" onclick="event.stopPropagation()">
    <h3 id="item-modal-title">➕ নতুন আইটেম</h3>
    <input type="hidden" id="edit-item-id">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div class="field"><div class="label">নাম *</div><input type="text" class="inp" id="item-name" placeholder="খাবারের নাম"></div>
      <div class="field"><div class="label">Emoji</div><input type="text" class="inp" id="item-emoji" placeholder="🍚" maxlength="4"></div>
    </div>
    <div class="field"><div class="label">বিবরণ</div><input type="text" class="inp" id="item-desc" placeholder="সংক্ষিপ্ত বিবরণ..."></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div class="field"><div class="label">দাম (৳) *</div><input type="text" inputmode="decimal" class="inp" id="item-price" placeholder="0"></div>
      <div class="field"><div class="label">ক্যাটাগরি</div><input type="text" class="inp" id="item-cat" placeholder="ভাত, মাছ..."></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-green" id="item-save-btn" onclick="saveMenuItem()">✓ সংরক্ষণ করুন</button>
      <button class="btn btn-ghost" onclick="closeItemModal()">বাতিল</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SB_URL = '__SUPABASE_URL__';
const SB_KEY = '__SUPABASE_KEY__';
const SELLER_PASS = '__SELLER_PASS__'; // set in env

let orders = [], menuItems = [], alarmActive = false, alarmAudio = null;
let knownOrderIds = new Set();
let pollTimer = null;
let currentTab = 'orders';

// ── Alarm ──
function startAlarm(pendingCount) {
  if (alarmActive) return;
  alarmActive = true;
  document.getElementById('alarm-sub').textContent = `${pendingCount}টি নতুন অর্ডার অপেক্ষা করছে`;
  document.getElementById('alarm-overlay').classList.add('show');
  // Web Audio beep
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    function beep() {
      if (!alarmActive) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(660, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.5, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
      if (alarmActive) setTimeout(beep, 600);
    }
    beep();
  } catch {}
}

function stopAlarm() {
  alarmActive = false;
  document.getElementById('alarm-overlay').classList.remove('show');
}

// ── Auth ──
const SELLER_KEY = 'seller_logged_in';
function doSellerLogin() {
  const pw = document.getElementById('seller-pw').value;
  if (pw === SELLER_PASS || pw === 'seller123') { // fallback for demo
    localStorage.setItem(SELLER_KEY, '1');
    document.getElementById('login-overlay').classList.add('hide');
    startApp();
  } else {
    alert('পাসওয়ার্ড ভুল!');
    document.getElementById('seller-pw').value = '';
  }
}
function doLogout() { if (!confirm('লগ আউট করবেন?')) return; localStorage.removeItem(SELLER_KEY); location.reload(); }

// ── Supabase ──
function sbH() { return { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Prefer': 'return=representation' }; }
async function sbGet(t, q = '') { const r = await fetch(`${SB_URL}/rest/v1/${t}?${q}`, { headers: sbH() }); if (!r.ok) throw new Error(await r.text()); return r.json(); }
async function sbPost(t, d) { const r = await fetch(`${SB_URL}/rest/v1/${t}`, { method: 'POST', headers: sbH(), body: JSON.stringify(d) }); if (!r.ok) throw new Error(await r.text()); return r.json(); }
async function sbPatch(t, q, d) { const r = await fetch(`${SB_URL}/rest/v1/${t}?${q}`, { method: 'PATCH', headers: sbH(), body: JSON.stringify(d) }); if (!r.ok) throw new Error(await r.text()); return r.json(); }
async function sbDelete(t, q) { const r = await fetch(`${SB_URL}/rest/v1/${t}?${q}`, { method: 'DELETE', headers: sbH() }); if (!r.ok) throw new Error(await r.text()); }

// ── Helpers ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function showToast(msg, dur = 2400) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), dur); }
function setSyncState(s, l) { document.getElementById('sync-dot').className = 'sync-dot ' + s; document.getElementById('sync-label').textContent = l; }
function timeSince(iso) {
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return `${Math.floor(diff)}সে আগে`;
  if (diff < 3600) return `${Math.floor(diff / 60)}মি আগে`;
  return `${Math.floor(diff / 3600)}ঘ আগে`;
}

// ── Tabs ──
function showTab(name) {
  currentTab = name;
  ['orders', 'menu', 'report'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
    document.getElementById('nb-' + t).classList.toggle('active', t === name);
  });
  if (name === 'menu') renderMenuMgmt();
}

// ── Load Data ──
async function loadOrders(silent = false) {
  if (!silent) setSyncState('syncing', 'লোড হচ্ছে...');
  try {
    const today = new Date().toISOString().slice(0, 10);
    orders = await sbGet('gs_orders', `select=*&order=created_at.desc`);
    setSyncState('ok', 'লাইভ');

    // Check for NEW pending orders
    const pending = orders.filter(o => o.status === 'pending');
    const newOrders = pending.filter(o => !knownOrderIds.has(o.id));
    if (newOrders.length > 0) {
      newOrders.forEach(o => knownOrderIds.add(o.id));
      startAlarm(pending.length);
      document.getElementById('new-badge').classList.add('show');
    }
    // If no more pending, clear badge
    if (pending.length === 0) document.getElementById('new-badge').classList.remove('show');

    // Stats
    const active = orders.filter(o => ['confirmed', 'preparing'].includes(o.status));
    const todayBill = orders.filter(o => o.created_at?.startsWith(today) && o.status !== 'cancelled').reduce((s, o) => s + Number(o.total || 0), 0);
    document.getElementById('stat-pending').textContent = pending.length;
    document.getElementById('stat-active').textContent = active.length;
    document.getElementById('stat-today').textContent = `৳${todayBill.toLocaleString()}`;

    renderOrders();
    return true;
  } catch { setSyncState('err', 'সংযোগ নেই'); return false; }
}

async function loadMenu() {
  try { menuItems = await sbGet('gs_menu_items', 'select=*&order=category.asc,sort_order.asc'); }
  catch { menuItems = []; }
}

// ── Render Orders ──
function renderOrders() {
  const filter = document.getElementById('order-filter').value;
  let filtered = orders;
  if (filter === 'active') filtered = orders.filter(o => ['pending', 'confirmed', 'preparing'].includes(o.status));
  else if (filter === 'delivered') filtered = orders.filter(o => o.status === 'delivered');

  const list = document.getElementById('order-list');
  if (!filtered.length) { list.innerHTML = '<div class="empty">কোনো অর্ডার নেই</div>'; return; }

  const statusMap = {
    pending: ['⏳ অপেক্ষায়', 'sb-pending'],
    confirmed: ['✓ নিশ্চিত', 'sb-confirmed'],
    preparing: ['👨‍🍳 তৈরি হচ্ছে', 'sb-preparing'],
    delivered: ['✅ ডেলিভারি', 'sb-delivered'],
    cancelled: ['❌ বাতিল', 'sb-cancelled']
  };

  list.innerHTML = filtered.map(o => {
    const [stText, stClass] = statusMap[o.status] || ['?', ''];
    const items = JSON.parse(o.items || '[]');
    const isNew = o.status === 'pending';
    const mapLink = o.address_lat ? `<a href="https://www.google.com/maps?q=${o.address_lat},${o.address_lng}" target="_blank" class="map-link">🗺️ Google Maps-এ দেখুন</a>` : '';

    return `<div class="order-card anim ${isNew ? 'new-order' : o.status}">
      <div class="order-top">
        <div>
          <div class="order-id">#${o.id}</div>
          <div class="order-time">${timeSince(o.created_at)}</div>
        </div>
        <div class="order-status-badge ${stClass}">${stText}</div>
      </div>

      <div class="order-customer">
        <div class="customer-avatar">${(o.customer_name || '?').charAt(0)}</div>
        <div class="customer-info">
          <div class="customer-name">${esc(o.customer_name || 'অজানা')}</div>
          <div class="customer-phone">📞 <a href="tel:${o.customer_phone}" style="color:var(--blue);text-decoration:none;">${esc(o.customer_phone || '—')}</a></div>
        </div>
      </div>

      <div class="order-items-list">
        ${items.map(i => `<div class="order-item-row"><span>${i.qty}× ${esc(i.name)}</span><span style="color:var(--gold);">৳${i.subtotal}</span></div>`).join('')}
      </div>

      ${o.address_detail ? `<div class="order-addr">
        <div class="order-addr-label">📍 ডেলিভারি ঠিকানা</div>
        <div class="order-addr-text">${esc(o.address_detail)}${o.address_landmark ? '<br>🏠 ' + esc(o.address_landmark) : ''}</div>
        ${mapLink}
      </div>` : ''}

      <div class="order-total-row">
        <span class="order-total-label">মোট বিল</span>
        <span class="order-total-val">৳${o.total}</span>
      </div>

      <div class="order-actions">
        ${o.status === 'pending' ? `
          <button class="btn btn-green btn-row" style="flex:2;" onclick="updateOrderStatus('${o.id}','confirmed')">✓ Accept</button>
          <button class="btn btn-red" style="flex:1;" onclick="updateOrderStatus('${o.id}','cancelled')">বাতিল</button>
        ` : ''}
        ${o.status === 'confirmed' ? `<button class="btn btn-gold" onclick="updateOrderStatus('${o.id}','preparing')">👨‍🍳 রান্না শুরু</button>` : ''}
        ${o.status === 'preparing' ? `<button class="btn btn-green" onclick="updateOrderStatus('${o.id}','delivered')">✅ ডেলিভারি দিয়েছি</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function updateOrderStatus(orderId, status) {
  setSyncState('syncing', 'আপডেট হচ্ছে...');
  try {
    await sbPatch('gs_orders', `id=eq.${orderId}`, { status });
    orders = orders.map(o => o.id === orderId ? { ...o, status } : o);
    setSyncState('ok', 'লাইভ');
    showToast(`✓ অর্ডার ${status === 'confirmed' ? 'Accept' : status === 'delivered' ? 'ডেলিভারি' : status} হয়েছে`);
    renderOrders();
    updateStats();
  } catch { showToast('❌ আপডেট হয়নি'); setSyncState('err', 'সমস্যা'); }
}

function updateStats() {
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('stat-pending').textContent = orders.filter(o => o.status === 'pending').length;
  document.getElementById('stat-active').textContent = orders.filter(o => ['confirmed', 'preparing'].includes(o.status)).length;
  const todayBill = orders.filter(o => o.created_at?.startsWith(today) && o.status !== 'cancelled').reduce((s, o) => s + Number(o.total || 0), 0);
  document.getElementById('stat-today').textContent = `৳${todayBill.toLocaleString()}`;
}

// ── Menu Management ──
function renderMenuMgmt() {
  const list = document.getElementById('menu-mgmt-list');
  if (!menuItems.length) { list.innerHTML = '<div class="empty">মেনু খালি — নতুন আইটেম যোগ করুন</div>'; return; }
  list.innerHTML = menuItems.map(item => `
    <div class="menu-mgmt-item anim">
      <div class="mmi-emoji">${esc(item.emoji || '🍽')}</div>
      <div class="mmi-info">
        <div class="mmi-name">${esc(item.name)}</div>
        <div class="mmi-price">৳${item.price} • ${esc(item.category || '—')}</div>
      </div>
      <button style="background:rgba(59,158,255,.1);color:var(--blue);border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;margin-right:5px;" onclick="openItemModal('${item.id}')">✏️</button>
      <label class="mmi-toggle">
        <input type="checkbox" ${item.available ? 'checked' : ''} onchange="toggleItem('${item.id}',this.checked)">
        <span class="mmi-slider"></span>
      </label>
    </div>`).join('');
}

function openItemModal(id) {
  document.getElementById('edit-item-id').value = id || '';
  if (id) {
    const item = menuItems.find(i => i.id === id);
    document.getElementById('item-modal-title').textContent = '✏️ আইটেম সম্পাদনা';
    document.getElementById('item-name').value = item?.name || '';
    document.getElementById('item-emoji').value = item?.emoji || '';
    document.getElementById('item-desc').value = item?.description || '';
    document.getElementById('item-price').value = item?.price || '';
    document.getElementById('item-cat').value = item?.category || '';
  } else {
    document.getElementById('item-modal-title').textContent = '➕ নতুন আইটেম';
    ['item-name', 'item-emoji', 'item-desc', 'item-price', 'item-cat'].forEach(id => document.getElementById(id).value = '');
  }
  document.getElementById('item-overlay').classList.add('open');
}
function closeItemModal() { document.getElementById('item-overlay').classList.remove('open'); }

async function saveMenuItem() {
  const name = document.getElementById('item-name').value.trim();
  const price = parseFloat(document.getElementById('item-price').value) || 0;
  if (!name || price <= 0) { showToast('নাম ও দাম দিন'); return; }
  const btn = document.getElementById('item-save-btn');
  btn.disabled = true; btn.textContent = '⏳...';
  const data = {
    name,
    emoji: document.getElementById('item-emoji').value.trim() || '🍽',
    description: document.getElementById('item-desc').value.trim(),
    price,
    category: document.getElementById('item-cat').value.trim() || 'অন্যান্য',
    available: true,
    sort_order: menuItems.length + 1
  };
  try {
    const editId = document.getElementById('edit-item-id').value;
    if (editId) {
      await sbPatch('gs_menu_items', `id=eq.${editId}`, data);
      menuItems = menuItems.map(i => i.id === editId ? { ...i, ...data } : i);
    } else {
      const [row] = await sbPost('gs_menu_items', { id: uid(), ...data });
      menuItems.push(row || { id: uid(), ...data });
    }
    closeItemModal(); renderMenuMgmt();
    showToast('✓ সংরক্ষিত');
  } catch { showToast('❌ সেভ হয়নি'); }
  btn.disabled = false; btn.textContent = '✓ সংরক্ষণ করুন';
}

async function toggleItem(id, available) {
  try {
    await sbPatch('gs_menu_items', `id=eq.${id}`, { available });
    menuItems = menuItems.map(i => i.id === id ? { ...i, available } : i);
    showToast(available ? '✓ আইটেম চালু' : '✓ আইটেম বন্ধ');
  } catch { showToast('❌ আপডেট হয়নি'); renderMenuMgmt(); }
}

// ── Report ──
function renderReport() {
  const today = new Date().toISOString().slice(0, 10);
  const todayOrders = orders.filter(o => o.created_at?.startsWith(today));
  const delivered = todayOrders.filter(o => o.status === 'delivered');
  const totalBill = delivered.reduce((s, o) => s + Number(o.total || 0), 0);
  document.getElementById('today-report').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
      <div style="background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.15);border-radius:12px;padding:12px;text-align:center;">
        <div style="font-size:22px;font-weight:800;color:var(--green);">${todayOrders.length}টি</div>
        <div style="font-size:11px;color:var(--muted);">মোট অর্ডার</div>
      </div>
      <div style="background:rgba(240,180,41,.08);border:1px solid rgba(240,180,41,.15);border-radius:12px;padding:12px;text-align:center;">
        <div style="font-size:22px;font-weight:800;color:var(--gold);">৳${totalBill.toLocaleString()}</div>
        <div style="font-size:11px;color:var(--muted);">আয় (ডেলিভারি)</div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--muted);">বাতিল: ${todayOrders.filter(o=>o.status==='cancelled').length}টি &nbsp;|&nbsp; অপেক্ষায়: ${todayOrders.filter(o=>o.status==='pending').length}টি</div>`;
}

async function updateShopStatus() {
  const status = document.getElementById('shop-status').value;
  try {
    await sbPatch('gs_settings', 'key=eq.shop_status', { value: status });
    showToast(status === 'open' ? '✓ শপ খোলা হয়েছে' : '✓ শপ বন্ধ করা হয়েছে');
  } catch { showToast('settings table নেই — তবু কাজ চলবে'); }
}

// ── Start App ──
async function startApp() {
  setSyncState('syncing', 'লোড হচ্ছে...');
  await Promise.all([loadOrders(), loadMenu()]);
  // Poll every 8 seconds for new orders
  pollTimer = setInterval(() => loadOrders(true), 8000);
}

// ── Boot ──
(function boot() {
  if (localStorage.getItem(SELLER_KEY)) {
    document.getElementById('login-overlay').classList.add('hide');
    startApp();
  }
})();
</script>
